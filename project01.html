<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Figma Embed</title>
    <style>
        /* Wrapper to keep aspect ratio */
        .figma-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            /* 16:9 ratio */
            height: 0;
            overflow: hidden;
        }

        .figma-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            /* default: no border */
        }

        /* Add border only on larger screens (PC size) */
        @media (min-width: 1024px) {
            .figma-container iframe {
                border: 2px solid rgba(0, 0, 0, 0.2);
                border-radius: 6px;
            }
        }
    </style>
</head>

<body>
    <h1>My Figma Prototype</h1>

    <div class="figma-container">
        <iframe
            src="https://embed.figma.com/proto/e7cG2ejNQ5QNRVhjmKMjQb/Untitled?node-id=62-709&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&embed-host=share"
            allowfullscreen>
        </iframe>
    </div>
</body>

</html>
